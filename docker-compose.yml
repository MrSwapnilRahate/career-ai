# ─── CareerAI Platform — Local Development ───────────────────
# Usage: docker-compose up
# Backend: http://localhost:5001
# Frontend: npm run client:dev → http://localhost:5173
# ──────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ─── Backend API (hot reload via nodemon) ────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: career-ai-api
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./server.js:/app/server.js
      - ./src:/app/src
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Redis (local dev queue) ─────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: career-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
