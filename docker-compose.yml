# ─── CareerAI Platform — Local Development ───────────────────
# Usage: docker-compose up --build
# ──────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ─── Backend API ─────────────────────────────────────────────
  api:
    build: .
    container_name: career-ai-api
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ─── Redis (local dev — replace with Upstash in production) ─
  redis:
    image: redis:7-alpine
    container_name: career-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
